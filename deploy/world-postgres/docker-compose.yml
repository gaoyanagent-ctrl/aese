services:
  world-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aese_world
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_local_only
    ports: ["55432:5432"]
    volumes:
      - aese-world-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aese_world"]
      interval: 2s
      timeout: 3s
      retries: 15
volumes:
  aese-world-data:
